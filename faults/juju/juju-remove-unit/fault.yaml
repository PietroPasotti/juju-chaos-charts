---
apiVersion: litmuschaos.io/v1alpha1
description:
  message: |
    Removes specific units from a Juju application to test resilience to unit loss.
kind: ChaosExperiment
metadata:
  name: juju-remove-unit
  labels:
    name: juju-remove-unit
    app.kubernetes.io/part-of: litmus
    app.kubernetes.io/component: chaosexperiment
    app.kubernetes.io/version: ci
spec:
  definition:
    scope: Cluster
    permissions:
      - apiGroups: [""]
        resources: ["pods"]
        verbs:
          [
            "create",
            "delete",
            "get",
            "list",
            "patch",
            "update",
            "deletecollection",
          ]
      - apiGroups: [""]
        resources: ["events"]
        verbs: ["create", "get", "list", "patch", "update"]
      - apiGroups: [""]
        resources: ["secrets", "configmaps"]
        verbs: ["get", "list"]
      - apiGroups: [""]
        resources: ["pods/log"]
        verbs: ["get", "list", "watch"]
      - apiGroups: [""]
        resources: ["pods/exec"]
        verbs: ["get", "list", "create"]
      - apiGroups: ["batch"]
        resources: ["jobs"]
        verbs: ["create", "list", "get", "delete", "deletecollection"]
      - apiGroups: ["litmuschaos.io"]
        resources: ["chaosengines", "chaosexperiments", "chaosresults"]
        verbs: ["create", "list", "get", "patch", "update", "delete"]
      - apiGroups: [""]
        resources: ["nodes"]
        verbs: ["get", "list"]
    image: "juju-go-runner:latest"
    imagePullPolicy: IfNotPresent
    args:
      - -c
      - ./experiments -name juju-remove-unit
    command:
      - /bin/bash
    env:
      - name: TOTAL_CHAOS_DURATION
        value: "30"

      - name: RAMP_TIME
        value: ""

      - name: JUJU_MODEL_UUID
        value: ""

      - name: APPLICATION
        value: ""

      # Comma-separated unit IDs, e.g. "myapp/0,myapp/1"
      - name: UNIT_IDS
        value: ""

      - name: JUJU_CREDENTIALS_FILE
        value: "/tmp/juju-credentials.yaml"

    labels:
      name: juju-remove-unit
      app.kubernetes.io/part-of: litmus
      app.kubernetes.io/component: experiment-job
      app.kubernetes.io/version: ci
    secrets:
      - name: juju-credentials
        mountPath: /tmp/
