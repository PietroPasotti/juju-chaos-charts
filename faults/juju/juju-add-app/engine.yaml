---
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: juju-chaos
  namespace: default
spec:
  engineState: 'active'
  chaosServiceAccount: litmus-admin
  experiments:
    - name: juju-add-app
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: '30'

            - name: JUJU_MODEL_UUID
              value: ''

            - name: CHARM_NAME
              value: ''

            - name: APPLICATION_NAME
              value: ''

            - name: CHANNEL
              value: 'stable'

            - name: NUM_UNITS
              value: '1'

            # JSON string of config key-value pairs
            - name: CONFIG
              value: ''
